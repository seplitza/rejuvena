name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Build Rejuvena Web App
        working-directory: ./web
        run: |
          rm -rf .next node_modules/.cache .npm
          npm ci --legacy-peer-deps
          echo "Building Rejuvena with timestamp: $(date)"
          NODE_ENV=production npm run build
          touch ./out/.nojekyll
      
      - name: Build Shop Frontend
        working-directory: ./shop-frontend
        run: |
          rm -rf .next node_modules/.cache .npm
          npm ci --legacy-peer-deps
          echo "Building Shop with timestamp: $(date)"
          NODE_ENV=production npm run build
          touch ./out/.nojekyll
      
      - name: Combine builds
        run: |
          mkdir -p combined-output/rejuvena combined-output/shop
          
          # Copy Rejuvena app to /rejuvena
          cp -r web/out/* combined-output/rejuvena/
          
          # Copy Shop to /shop
          cp -r shop-frontend/out/* combined-output/shop/
          
          # Create root index.html redirecting to /rejuvena
          cat > combined-output/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="ru">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <meta http-equiv="refresh" content="0; url=/rejuvena">
            <title>Seplitza - Redirecting...</title>
            <style>
              body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                margin: 0;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
              }
              .container {
                text-align: center;
                padding: 2rem;
              }
              h1 {
                font-size: 3rem;
                margin-bottom: 1rem;
              }
              p {
                font-size: 1.2rem;
                margin-bottom: 2rem;
              }
              .links {
                display: flex;
                gap: 1rem;
                justify-content: center;
                flex-wrap: wrap;
              }
              a {
                display: inline-block;
                padding: 1rem 2rem;
                background: white;
                color: #667eea;
                text-decoration: none;
                border-radius: 0.5rem;
                font-weight: 600;
                transition: transform 0.2s;
              }
              a:hover {
                transform: translateY(-2px);
              }
            </style>
          </head>
          <body>
            <div class="container">
              <h1>Seplitza</h1>
              <p>Перенаправление на Rejuvena App...</p>
              <div class="links">
                <a href="/rejuvena">Rejuvena App</a>
                <a href="/shop">Shop</a>
              </div>
            </div>
            <script>
              // Redirect to rejuvena if not already there
              if (window.location.pathname === '/') {
                window.location.href = '/rejuvena';
              }
            </script>
          </body>
          </html>
          EOF
          
          # Copy .nojekyll to root
          touch combined-output/.nojekyll
          
          echo "Combined structure:"
          ls -la combined-output/
          echo "Rejuvena files:"
          ls -la combined-output/rejuvena/ | head -20
          echo "Shop files:"
          ls -la combined-output/shop/ | head -20
      
      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./combined-output
          publish_branch: gh-pages
          force_orphan: true
          commit_message: 'Deploy Rejuvena + Shop from main ${{ github.sha }}'
