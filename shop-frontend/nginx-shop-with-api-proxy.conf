# Nginx config для shop.seplitza.ru с API proxy
# Файл: /etc/nginx/sites-available/shop.seplitza.ru
# Симлинк: /etc/nginx/sites-enabled/shop.seplitza.ru

server {
    listen 80;
    listen [::]:80;
    server_name shop.seplitza.ru;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name shop.seplitza.ru;

    # SSL (Let's Encrypt или Cloudflare)
    ssl_certificate /etc/letsencrypt/live/shop.seplitza.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shop.seplitza.ru/privkey.pem;

    # Next.js shop (SSR)
    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Backend API Proxy (решение Mixed Content)
    # Запросы к /api/* проксируются на localhost:9527
    location /api/ {
        proxy_pass http://localhost:9527/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # CORS headers (if needed)
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
        
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }
}
